name: temetro

services:
  nginx:
    image: nginx:alpine
    container_name: temetro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - docs

  web:
    environment:
      NODE_ENV: production

  postgres:
    ports: []
